<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO Fetal Growth Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active { background-color: #2563eb; color: white; }
        .tab-btn:not(.active) { background-color: #f3f4f6; color: #374151; }
        .tab-btn:not(.active):hover { background-color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- LEFT PANEL -->
        <div class="lg:col-span-1 space-y-5">
            
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h1 class="text-2xl font-bold text-blue-700 mb-1">WHO Fetal Growth Tracker</h1>
                <p class="text-sm text-gray-500">Enter ultrasound measurements to plot serial growth against WHO standard percentiles.</p>
            </div>

            <!-- ADD MEASUREMENT FORM -->
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Add Measurement</h2>
                <form id="dataForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Fetal Sex (for EFW chart)</label>
                        <div class="flex gap-4">
                            <label class="inline-flex items-center gap-1.5 cursor-pointer">
                                <input type="radio" name="fetalSex" value="female" checked onchange="changeSex('female')" class="text-pink-500 focus:ring-pink-400">
                                <span class="text-sm text-pink-600 font-medium">♀ Female</span>
                            </label>
                            <label class="inline-flex items-center gap-1.5 cursor-pointer">
                                <input type="radio" name="fetalSex" value="male" onchange="changeSex('male')" class="text-blue-500 focus:ring-blue-400">
                                <span class="text-sm text-blue-600 font-medium">♂ Male</span>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Weeks</label>
                            <input type="number" id="weeks" min="14" max="40" required class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 24">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Days</label>
                            <input type="number" id="days" min="0" max="6" value="0" required class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="border-t pt-3 mt-2">
                        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Biometry (mm)</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">Head Circ. (HC)</label>
                                <input type="number" id="hc" min="0" max="500" step="0.1" class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="mm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">Biparietal D. (BPD)</label>
                                <input type="number" id="bpd" min="0" max="200" step="0.1" class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="mm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">Abdom. Circ. (AC)</label>
                                <input type="number" id="ac" min="0" max="500" step="0.1" class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="mm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">Femur Length (FL)</label>
                                <input type="number" id="fl" min="0" max="200" step="0.1" class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="mm">
                            </div>
                        </div>
                    </div>

                    <div class="border-t pt-3 mt-2">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Est. Fetal Weight (g)</label>
                        <input type="number" id="weight" min="50" max="6000" class="block w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 650">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded hover:bg-blue-700 transition text-sm">
                        Add Data Point
                    </button>
                </form>
            </div>

            <!-- PATIENT DATA TABLE -->
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Patient Data</h2>
                <div class="overflow-x-auto max-h-64 overflow-y-auto">
                    <table class="w-full text-xs text-left text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-2 py-2">GA</th>
                                <th class="px-2 py-2">HC</th>
                                <th class="px-2 py-2">BPD</th>
                                <th class="px-2 py-2">AC</th>
                                <th class="px-2 py-2">FL</th>
                                <th class="px-2 py-2">EFW</th>
                                <th class="px-2 py-2"></th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody"></tbody>
                    </table>
                    <p id="emptyState" class="text-center text-gray-400 mt-4 italic text-sm">No data added yet.</p>
                </div>
            </div>

            <!-- PDF REPORT BUTTON -->
            <button id="downloadPdfBtn" onclick="generatePDF()" class="w-full bg-emerald-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-emerald-700 transition text-sm flex items-center justify-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />

                <canvas id="growthChart"></canvas>
            </div>
        </div>

                    { week: 25, p3: 41, p10: 43, p50: 46, p90: 48, p97: 50 },
                    { week: 26, p3: 43, p10: 45, p50: 48, p90: 51, p97: 52 },
                    { week: 27, p3: 46, p10: 47, p50: 50, p90: 53, p97: 55 },
                    { week: 28, p3: 48, p10: 49, p50: 52, p90: 55, p97: 57 },
                    { week: 29, p3: 50, p10: 51, p50: 54, p90: 57, p97: 59 },
                    { week: 30, p3: 51, p10: 53, p50: 56, p90: 60, p97: 61 },
                    { week: 31, p3: 53, p10: 55, p50: 59, p90: 62, p97: 64 },
                    { week: 32, p3: 55, p10: 57, p50: 61, p90: 64, p97: 66 },
                    { week: 33, p3: 57, p10: 60, p50: 63, p90: 66, p97: 68 },
                    { week: 34, p3: 59, p10: 61, p50: 65, p90: 68, p97: 70 },
                    { week: 35, p3: 61, p10: 63, p50: 67, p90: 70, p97: 73 },
                    { week: 36, p3: 63, p10: 65, p50: 69, p90: 72, p97: 75 },
                    { week: 37, p3: 65, p10: 67, p50: 70, p90: 74, p97: 76 },
                    { week: 38, p3: 66, p10: 68, p50: 72, p90: 75, p97: 78 },
                    { week: 39, p3: 67, p10: 69, p50: 73, p90: 76, p97: 79 },
                    { week: 40, p3: 68, p10: 69, p50: 73, p90: 77, p97: 79 }
                ]
            }
        };

        // ============================================================
        // STATE
        // ============================================================
        let patientData = [];
        let currentMetric = 'efw';
        let selectedSex = 'female';

        window.changeSex = function(sex) {
            selectedSex = sex;
            // If currently viewing EFW, refresh the chart with new sex data
            if (currentMetric === 'efw') {
                switchMetric('efw');
            }
        };

        // ============================================================
        // CHART INITIALIZATION
        // ============================================================
        function buildPercentileDatasets(metric) {
            const ref = referenceDataSets[metric].data;
            const p3  = ref.map(d => ({ x: d.week, y: d.p3 }));
            const p10 = ref.map(d => ({ x: d.week, y: d.p10 }));
            const p50 = ref.map(d => ({ x: d.week, y: d.p50 }));
            const p90 = ref.map(d => ({ x: d.week, y: d.p90 }));
            const p97 = ref.map(d => ({ x: d.week, y: d.p97 }));

            return [
                {
                    label: '97th',
                    data: p97,
                    borderColor: '#d1d5db',
                    borderDash: [3, 3],
                    borderWidth: 1,
                    showLine: true,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '90th',
                    data: p90,
                    borderColor: '#9ca3af',
                    borderDash: [5, 5],
                    borderWidth: 1.5,
                    showLine: true,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '50th',
                    data: p50,
                    borderColor: '#10b981',
                    borderWidth: 2,
                    showLine: true,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '10th',
                    data: p10,
                    borderColor: '#9ca3af',
                    borderDash: [5, 5],
                    borderWidth: 1.5,
                    showLine: true,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '3rd',
                    data: p3,
                    borderColor: '#d1d5db',
                    borderDash: [3, 3],
                    borderWidth: 1,
                    showLine: true,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: 'Patient Data',
                    data: [],
                    borderColor: '#2563eb',
                    backgroundColor: '#2563eb',
                    showLine: true,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    borderWidth: 2,
                    fill: false,
                    tension: 0
                }
            ];
        }

        function getYAxisConfig(metric) {
            const configs = {
                efw: { min: 0, max: 4500, label: 'Estimated Fetal Weight (g)' },
                hc:  { min: 60, max: 400, label: 'Head Circumference (mm)' },
                bpd: { min: 15, max: 110, label: 'Biparietal Diameter (mm)' },
                ac:  { min: 50, max: 430, label: 'Abdominal Circumference (mm)' },
                fl:  { min: 5, max: 85, label: 'Femur Length (mm)' }
            };
            return configs[metric];
        }

        const ctx = document.getElementById('growthChart').getContext('2d');
        const growthChart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: buildPercentileDatasets('efw')
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: 'Gestational Age (Weeks)', font: { size: 13, weight: 'bold' } },
                        min: 14,
                        max: 40,
                        ticks: { stepSize: 2 }
                    },
                    y: {
                        title: { display: true, text: getYAxisConfig('efw').label, font: { size: 13, weight: 'bold' } },
                        min: getYAxisConfig('efw').min,
                        max: getYAxisConfig('efw').max
                    }
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            padding: 16,
                            font: { size: 11 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) { label += ': '; }
                                if (context.parsed.y !== null) {
                                    const unit = referenceDataSets[currentMetric].unit;
                                    if (context.dataset.label === 'Patient Data') {
                                        const pt = patientData.find(p => p.decimalAge === context.parsed.x);
                                        const ageText = pt ? `${pt.weeks}w ${pt.days}d` : `${context.parsed.x.toFixed(1)}w`;
                                        label += `${context.parsed.y}${unit} at ${ageText}`;
                                    } else {
                                        label += `${context.parsed.y}${unit}`;
                                    }
                                }
                                return label;
                            }
                        }
                    }
                }
            }
        });

        // ============================================================
        // SWITCH METRIC (TAB)
        // ============================================================
        window.switchMetric = function(metric) {
            currentMetric = metric;

            // Update tab styles
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.metric === metric);
            });

            // Rebuild chart datasets
            const newDatasets = buildPercentileDatasets(metric);
            
            // Populate patient data for this metric
            const patientChartData = getPatientChartData(metric);
            newDatasets[5].data = patientChartData;

            growthChart.data.datasets = newDatasets;

            // Update Y axis
            const yConfig = getYAxisConfig(metric);
            growthChart.options.scales.y.min = yConfig.min;
            growthChart.options.scales.y.max = yConfig.max;
            growthChart.options.scales.y.title.text = yConfig.label;

            growthChart.update();
        };

        function getPatientChartData(metric) {
            const fieldMap = { efw: 'weight', hc: 'hc', bpd: 'bpd', ac: 'ac', fl: 'fl' };
            const field = fieldMap[metric];
            return patientData
                .filter(d => d[field] !== null && d[field] !== undefined && d[field] !== '')
                .map(d => ({ x: d.decimalAge, y: parseFloat(d[field]) }));
        }

        // ============================================================
        // FORM SUBMISSION
        // ============================================================
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const weeks  = parseInt(document.getElementById('weeks').value);
            const days   = parseInt(document.getElementById('days').value);
            const hc     = document.getElementById('hc').value ? parseFloat(document.getElementById('hc').value) : null;
            const bpd    = document.getElementById('bpd').value ? parseFloat(document.getElementById('bpd').value) : null;
            const ac     = document.getElementById('ac').value ? parseFloat(document.getElementById('ac').value) : null;
            const fl     = document.getElementById('fl').value ? parseFloat(document.getElementById('fl').value) : null;
            const weight = document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null;

            // At least one measurement must be provided
            if (hc === null && bpd === null && ac === null && fl === null && weight === null) {
                alert('Please enter at least one measurement.');
                return;
            }

            const decimalAge = +(weeks + (days / 7)).toFixed(2);

            patientData.push({
                id: Date.now(),
                weeks, days, decimalAge,
                hc, bpd, ac, fl, weight
            });

            patientData.sort((a, b) => a.decimalAge - b.decimalAge);

            updateTable();
            updateChart();

            // Reset form
            this.reset();
            document.getElementById('days').value = 0;
        });

        // ============================================================
        // UPDATE TABLE
        // ============================================================
        function updateTable() {
            const tbody = document.getElementById('dataTableBody');
            const emptyState = document.getElementById('emptyState');

            tbody.innerHTML = '';

            if (patientData.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            patientData.forEach(data => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white border-b hover:bg-gray-50';
                const fmt = (v) => v !== null && v !== undefined ? v : '—';
                tr.innerHTML = `
                    <td class="px-2 py-2 font-medium text-gray-900 whitespace-nowrap">${data.weeks}w${data.days}d</td>
                    <td class="px-2 py-2">${fmt(data.hc)}</td>
                    <td class="px-2 py-2">${fmt(data.bpd)}</td>
                    <td class="px-2 py-2">${fmt(data.ac)}</td>
                    <td class="px-2 py-2">${fmt(data.fl)}</td>
                    <td class="px-2 py-2">${fmt(data.weight)}</td>
                    <td class="px-2 py-2">
                        <button onclick="removeData(${data.id})" class="text-red-500 hover:text-red-700 font-bold text-sm" title="Remove">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ============================================================
        // UPDATE CHART
        // ============================================================
        function updateChart() {
            const patientChartData = getPatientChartData(currentMetric);
            growthChart.data.datasets[5].data = patientChartData;
            growthChart.update();
        }

        // ============================================================
        // REMOVE DATA
        // ============================================================
        window.removeData = function(id) {
            patientData = patientData.filter(d => d.id !== id);
            updateTable();
            updateChart();
        };

        // ============================================================
        // PDF REPORT GENERATION
        // ============================================================
        window.generatePDF = async function() {
            if (patientData.length === 0) {
                alert('Please add at least one measurement before generating a report.');
                return;
            }

            const btn = document.getElementById('downloadPdfBtn');
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Generating PDF...
            `;

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('portrait', 'mm', 'a4');
                const pageWidth = doc.internal.pageSize.getWidth();
                const margin = 15;
                const contentWidth = pageWidth - margin * 2;
                let yPos = margin;

                // ---- HEADER ----
                doc.setFillColor(37, 99, 235); // Blue header
                doc.rect(0, 0, pageWidth, 28, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text('Fetal Growth Report', margin, 12);
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                doc.text('Generated: ' + dateStr, margin, 20);
                doc.text('Serial Growth Charting — WHO Percentile Reference', margin, 25);

                yPos = 36;

                // ---- CURRENT CHART TITLE ----
                const metricLabels = {
                    efw: 'Estimated Fetal Weight',
                    hc: 'Head Circumference',
                    bpd: 'Biparietal Diameter',
                    ac: 'Abdominal Circumference',
                    fl: 'Femur Length'
                };

                doc.setTextColor(30, 30, 30);
                doc.setFontSize(13);
                doc.setFont('helvetica', 'bold');
                doc.text('Growth Chart — ' + metricLabels[currentMetric], margin, yPos);
                yPos += 5;

                // ---- CHART IMAGE ----
                const canvas = document.getElementById('growthChart');
                const chartImage = canvas.toDataURL('image/png', 1.0);
                const chartAspect = canvas.height / canvas.width;
                const chartImgWidth = contentWidth;
                const chartImgHeight = chartImgWidth * chartAspect;
                doc.addImage(chartImage, 'PNG', margin, yPos, chartImgWidth, Math.min(chartImgHeight, 100));
                yPos += Math.min(chartImgHeight, 100) + 8;

                // ---- DATA TABLE ----
                doc.setFontSize(13);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(30, 30, 30);
                doc.text('Patient Measurement Data', margin, yPos);
                yPos += 6;

                // Table header
                const colWidths = [22, 25, 25, 25, 25, 25, 33];
                const headers = ['GA', 'HC (mm)', 'BPD (mm)', 'AC (mm)', 'FL (mm)', 'EFW (g)', 'Percentile'];
                
                doc.setFillColor(243, 244, 246);
                doc.rect(margin, yPos - 4, contentWidth, 7, 'F');
                doc.setFontSize(7.5);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(55, 65, 81);
                
                let xPos = margin + 1;
                headers.forEach((h, i) => {
                    doc.text(h, xPos, yPos);
                    xPos += colWidths[i];
                });
                yPos += 5;

                // Table rows
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7.5);

                const fmt = (v) => v !== null && v !== undefined ? String(v) : '—';

                // Helper: find approximate percentile for a value at a given decimal age
                function getApproxPercentile(metric, decimalAge, value) {
                    if (value === null || value === undefined) return '—';
                    const ref = referenceDataSets[metric].data;
                    // Find surrounding weeks
                    let lower = ref[0], upper = ref[ref.length - 1];
                    for (let i = 0; i < ref.length - 1; i++) {
                        if (decimalAge >= ref[i].week && decimalAge <= ref[i + 1].week) {
                            lower = ref[i];
                            upper = ref[i + 1];
                            break;
                        }
                    }
                    // Linear interpolation
                    const t = upper.week === lower.week ? 0 : (decimalAge - lower.week) / (upper.week - lower.week);
                    const interp = (key) => lower[key] + t * (upper[key] - lower[key]);
                    const p3 = interp('p3'), p10 = interp('p10'), p50 = interp('p50'), p90 = interp('p90'), p97 = interp('p97');

                    if (value <= p3) return '<3rd';
                    if (value <= p10) return '3rd–10th';
                    if (value <= p50) return '10th–50th';
                    if (value <= p90) return '50th–90th';
                    if (value <= p97) return '90th–97th';
                    return '>97th';
                }

                const fieldForMetric = { efw: 'weight', hc: 'hc', bpd: 'bpd', ac: 'ac', fl: 'fl' };
                const currentField = fieldForMetric[currentMetric];

                patientData.forEach((data, idx) => {
                    // Alternate row color
                    if (idx % 2 === 0) {
                        doc.setFillColor(249, 250, 251);
                        doc.rect(margin, yPos - 3.5, contentWidth, 6, 'F');
                    }

                    doc.setTextColor(30, 30, 30);
                    xPos = margin + 1;
                    const row = [
                        `${data.weeks}w ${data.days}d`,
                        fmt(data.hc),
                        fmt(data.bpd),
                        fmt(data.ac),
                        fmt(data.fl),
                        fmt(data.weight),
                        getApproxPercentile(currentMetric, data.decimalAge, data[currentField])
                    ];
                    row.forEach((cell, i) => {
                        doc.text(cell, xPos, yPos);
                        xPos += colWidths[i];
                    });
                    yPos += 6;

                    // Page break if needed
                    if (yPos > 270) {
                        doc.addPage();
                        yPos = margin;
                    }
                });

                yPos += 4;

                // ---- ADDITIONAL CHARTS (all other metrics) ----
                const otherMetrics = Object.keys(metricLabels).filter(m => m !== currentMetric);
                
                for (const metric of otherMetrics) {
                    // Check if patient has data for this metric
                    const field = fieldForMetric[metric];
                    const hasData = patientData.some(d => d[field] !== null && d[field] !== undefined);
                    if (!hasData) continue;

                    // Switch chart to this metric, capture, then switch back
                    switchMetric(metric);
                    // Wait for chart animation
                    await new Promise(r => setTimeout(r, 400));

                    if (yPos > 170) {
                        doc.addPage();
                        yPos = margin;
                    }

                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(30, 30, 30);
                    doc.text('Growth Chart — ' + metricLabels[metric], margin, yPos);
                    yPos += 5;

                    const img = canvas.toDataURL('image/png', 1.0);
                    doc.addImage(img, 'PNG', margin, yPos, chartImgWidth, Math.min(chartImgHeight, 90));
                    yPos += Math.min(chartImgHeight, 90) + 8;
                }

                // Switch back to original metric
                switchMetric(currentMetric);

                // ---- FOOTER ----
                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setFont('helvetica', 'italic');
                    doc.setTextColor(150, 150, 150);
                    doc.text(
                        'Fetal Growth Tracker — For clinical documentation purposes. Reference: WHO/Hadlock approximate percentiles.',
                        margin,
                        doc.internal.pageSize.getHeight() - 8
                    );
                    doc.text(
                        `Page ${i} of ${totalPages}`,
                        pageWidth - margin - 20,
                        doc.internal.pageSize.getHeight() - 8
                    );
                }

                // ---- SAVE ----
                doc.save('fetal-growth-report.pdf');

            } catch (err) {
                console.error('PDF generation error:', err);
                alert('An error occurred while generating the PDF. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Download PDF Report
                `;
            }
        };
    </script>
</body>
</html>
